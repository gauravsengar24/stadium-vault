<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" as="style" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  </noscript>
  <title>Stadium Guardian AI — Choose your portal</title>
</head>
<body>
  <div id="root">
    <div class="fixed inset-0 -z-10 overflow-hidden">
      <div class="absolute -left-40 top-20 size-96 rounded-full bg-safety-violet/20 blur-[140px]"></div>
      <div class="absolute -right-20 top-60 size-96 rounded-full bg-safety-cyan/20 blur-[140px]"></div>
      <div class="absolute bottom-0 left-1/3 size-80 rounded-full bg-safety-amber/15 blur-[120px]"></div>
    </div>
    <main class="relative z-10 mx-auto flex min-h-screen max-w-6xl flex-col items-center justify-center px-6 py-16">
      <div class="mb-10 flex flex-col items-center gap-3 text-center">
        <div class="glass inline-flex items-center gap-2 rounded-full px-3 py-1 text-[11px] font-medium uppercase tracking-[0.22em] text-muted-foreground">
          <span class="live-dot relative inline-block"><span class="block size-2 rounded-full bg-safety-green"></span></span>
          Metropolis Stadium · Live
        </div>
        <h1 class="mt-2 text-4xl font-semibold tracking-tight text-balance sm:text-5xl">
          Stadium Guardian <span class="text-safety-cyan">AI</span>
        </h1>
        <p class="max-w-xl text-pretty text-sm text-muted-foreground sm:text-base">
          AI-powered venue intelligence for 80,000 seats. Real-time alerts, food ordering, incident response, and crowd monitoring.
        </p>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
